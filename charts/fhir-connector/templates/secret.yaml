{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fhir-connector.secretName" . }}
  labels:
    {{- include "fhir-connector.labels" . | nindent 4 }}
type: Opaque
stringData:
  EMAIL_PASSWORD: {{ .Values.secret.data.EMAIL_PASSWORD | quote }}
  SMM_API_KEY: {{ .Values.secret.data.SMM_API_KEY | quote }}
{{- end }}
